name: Dependabot Policy Check

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:   # lets you trigger it manually from the GitHub UI

jobs:
  dependabot-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./
        with:
          api-endpoint: "https://localhost:3000/check"
          secret: ${{ secrets.DEPENDABOT_ENFORCER_SECRET }}
          mode: ${{ vars.DEPENDABOT_ENFORCER_MODE }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
