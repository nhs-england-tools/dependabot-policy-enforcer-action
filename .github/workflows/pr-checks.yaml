name: PR Checks

on:
  pull_request:
    types: [opened, reopened, edited]
    branches:
      - main

jobs:
  pr-title-check:
    permissions:
      contents: read
      pull-requests: read
    name: Check PR title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Check PR title
        uses: ./.github/actions/pr-title-checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pr-body-check:
    permissions:
      contents: read
      pull-requests: read
    name: Check PR body
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Check PR body
        uses: ./.github/actions/pr-body-checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
