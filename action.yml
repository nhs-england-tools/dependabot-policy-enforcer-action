name: "Dependabot Policy Enforcer"
description: "Validates Dependabot policy compliance"
author: "NHS England Tools"

inputs:
  mode:
    description: >-
      Operation mode for the enforcer. Can be 'enforce' to block non-compliant PRs or 'report' to only log results.
      Set this as an organisation or repository variable (vars.DEPENDABOT_ENFORCER_MODE).
    required: false
    default: "enforce"
  blocking-severity:
    description: >-
      Minimum severity level that will block the pipeline in enforce mode.
      Alerts at this level and above count as blocking violations; alerts below this level are
      reported in the PR comment but do not cause a failure.
      Accepted values: critical, high, medium, low.
    required: false
    default: "critical"
  github-token:
    description: >-
      GitHub token used to fetch Dependabot alerts and post a policy summary comment on the pull request.
      Use the built-in secrets.GITHUB_TOKEN.
    required: true

runs:
  using: "node24"
  main: "dist/index.cjs"
