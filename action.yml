name: "Dependabot Policy Enforcer"
description: "Validates Dependabot policy compliance via HMAC-signed API call"
author: "NHS England Tools"

inputs:
  mode:
    description: >-
      Operation mode for the enforcer. Can be 'enforce' to block non-compliant PRs or 'report' to only log results.
      Set this as an organisation or repository variable (vars.DEPENDABOT_ENFORCER_MODE).
    required: false
    default: "enforce"
  github-token:
    description: >-
      GitHub token used to post a policy summary comment on the pull request.
      Use the built-in secrets.GITHUB_TOKEN. If omitted, no PR comment is posted.
    required: false
    default: ""

runs:
  using: "node24"
  main: "dist/index.cjs"
